<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Go Dispatch Proxy GUI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>Go Dispatch Proxy</h1>
      <div id="status-badge" class="status-badge stopped">
        <span class="status-dot"></span>
        <span id="status-text">Stopped</span>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Mode</span>
      </div>
      <div class="mode-selector">
        <button id="mode-direct" class="mode-btn active" onclick="setMode('direct')">Direct Connection</button>
        <button id="mode-tunnel" class="mode-btn" onclick="setMode('tunnel')">SSH Tunnel</button>
      </div>
    </div>

    <div id="direct-section" class="card">
      <div class="card-header">
        <span class="card-title">Network Interfaces</span>
        <button class="refresh-btn" onclick="listInterfaces()">↻ Refresh</button>
      </div>
      <div id="network-list" class="network-list">
        <div class="heading-row">
          <span>Network</span>
          <span style="text-align: right;">Ratio</span>
        </div>
        <div id="networks-container"></div>
      </div>
    </div>

    <div id="tunnel-section" class="card" style="display: none;">
      <div class="card-header">
        <span class="card-title">SSH Tunnels</span>
      </div>
      <div class="tunnel-input">
        <input type="text" id="tunnel-input" class="text-input" placeholder="127.0.0.1:7777@1 127.0.0.1:7778@3">
        <p class="hint">Format: address:port@ratio (e.g., 127.0.0.1:7777@1)</p>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Proxy Settings</span>
      </div>
      <div class="proxy-settings">
        <div class="setting-row">
          <label>Listen Host</label>
          <input type="text" id="listen-host" class="text-input" value="127.0.0.1">
        </div>
        <div class="setting-row">
          <label>Listen Port</label>
          <input type="number" id="listen-port" class="text-input port-input" value="8081">
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="start-btn" class="action-btn run" onclick="startProxy()">▶ Start Proxy</button>
      <button id="stop-btn" class="action-btn stop" onclick="stopProxy()" style="display: none;">■ Stop Proxy</button>
      <div class="checkbox-row">
        <label class="autostart">
          <input type="checkbox" id="autostart" onchange="saveSettings()">
          Launch automatically at startup
        </label>
        <label class="autostart">
          <input type="checkbox" id="minimize-to-tray" onclick="onMinimizeToTrayChange()">
          Minimize to system tray
        </label>
      </div>
    </div>

    <div class="logs-container">
      <div class="logs-header">Logs</div>
<div id="logs" class="logs"></div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
